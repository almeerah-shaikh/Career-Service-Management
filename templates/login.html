{% extends "base.html" %}

{% block title %}Login - CareerbyAL{% endblock %}

{% block content %}
<div class="form-box">
    <h2 style="margin-bottom: 2rem; color: var(--charcoal);">Welcome <span class="fuchsia-text">Back!</span></h2>
    <form method="POST">
        <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; text-align: left;"><i class="fas fa-envelope"></i> Email Address</label>
        <input type="email" name="email" placeholder="E.g. john@university.edu" required>
        
        <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; text-align: left;"><i class="fas fa-lock"></i> Password</label>
        <input type="password" name="password" placeholder="Password" required>
        
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Login Now</button>
    </form>
    <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
        New to CareerbyAL? <a href="/register" class="mint-text">Register Here</a>
    </p>
</div>
{% endblock %}
