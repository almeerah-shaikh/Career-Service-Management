{% extends "base.html" %}

{% block title %}Admin Login - CareerbyAL{% endblock %}

{% block content %}
<div class="form-box" style="border-top: 5px solid var(--charcoal);">
    <div style="text-align: center; margin-bottom: 2rem;">
        <i class="fas fa-user-shield fa-4x" style="color: var(--charcoal); margin-bottom: 1.5rem; opacity: 0.1;"></i>
        <h2 style="color: var(--charcoal);">Admin <span class="mint-text">Login</span></h2>
        <p style="font-size: 0.85rem; opacity: 0.6;">Secure access for CareerbyAL administrators.</p>
    </div>
    
    <form method="POST">
        <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; text-align: left;"><i class="fas fa-user"></i> Admin Username</label>
        <input type="text" name="username" placeholder="Username" required>
        
        <label style="display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; text-align: left;"><i class="fas fa-lock"></i> Admin Password</label>
        <input type="password" name="password" placeholder="Password" required>
        
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem; background: var(--charcoal); color: white; border-radius: 8px;">Access Portal</button>
    </form>
    
    <div style="margin-top: 2rem; padding: 1rem; background: var(--light-gray); border-radius: 8px; text-align: center;">
        <p style="font-size: 0.8rem; font-weight: 600; color: var(--charcoal);">Demo Admin Credentials:</p>
        <code style="font-size: 0.85rem; color: var(--fuchsia);">admin / admin123</code>
    </div>
</div>
{% endblock %}
