{% extends "base.html" %}

{% block title %}Register - CareerbyAL{% endblock %}

{% block content %}
<div class="form-box">
    <h2 style="margin-bottom: 2rem; color: var(--charcoal);">Join <span class="mint-text">Career</span>byAL</h2>
    <form method="POST">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" name="name" placeholder="E.g. John Doe" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" name="email" placeholder="E.g. john@university.edu" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" name="password" placeholder="At least 6 characters" required>
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Create Account</button>
    </form>
    <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
        Already have an account? <a href="/login" class="mint-text">Login Here</a>
    </p>
</div>

<style>
    .form-group { margin-bottom: 0.5rem; text-align: left; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--charcoal); opacity: 0.8; }
</style>
{% endblock %}
